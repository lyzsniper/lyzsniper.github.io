    <script>
      // 防止主题闪烁 — 在 React 加载前应用主题
      (function () {
        try {
          var t = localStorage.getItem('blog-theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.classList.add(t);
        } catch (e) {}
      })();
    </script>
